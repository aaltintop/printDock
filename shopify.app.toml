# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "53d400d30cdc04626d5b6dc0ed02d0f4"
name = "printdock"
application_url = "https://printdock-service-u6yavvnujq-uc.a.run.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "orders/create" ]
  uri = "/webhooks/orders/create"

  [[webhooks.subscriptions]]
  topics = [ "app_subscriptions/update" ]
  uri = "/webhooks/app_subscriptions/update"

  # Mandatory App Store compliance (GDPR-style data requests / redaction). @see https://shopify.dev/docs/apps/build/compliance/privacy-law-compliance
  [[webhooks.subscriptions]]
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]
  uri = "/webhooks/compliance"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,read_orders,read_themes"

[auth]
redirect_urls = [ "https://printdock-service-u6yavvnujq-uc.a.run.app/api/auth" ]

[app_proxy]
url = "https://printdock-service-u6yavvnujq-uc.a.run.app"
subpath = "printdock"
prefix = "apps"
