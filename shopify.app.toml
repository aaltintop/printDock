# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "53d400d30cdc04626d5b6dc0ed02d0f4"
name = "PrintDock"
application_url = "https://printdock-service-u6yavvnujq-uc.a.run.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = [ "app_subscriptions/update" ]
  uri = "/webhooks/app_subscriptions/update"

  [[webhooks.subscriptions]]
  uri = "/webhooks/compliance"
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]

  [[webhooks.subscriptions]]
  topics = [ "orders/create" ]
  uri = "/webhooks/orders/create"

  [[webhooks.subscriptions]]
  topics = [ "orders/fulfilled" ]
  uri = "/webhooks/orders/fulfilled"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

# App-owned shop metafield: HMAC key for Cart Transform signed price tokens (read by Function input query).
[shop.metafields.app.hmac_secret]
type = "single_line_text_field"
name = "PrintDock pricing HMAC"
access.admin = "merchant_read"
access.storefront = "none"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_cart_transforms,read_orders,read_products,read_publications,read_themes,write_cart_transforms,write_products,write_publications"

[auth]
redirect_urls = [
  "https://printdock-service-u6yavvnujq-uc.a.run.app/auth/callback"
]

[app_proxy]
url = "https://printdock-service-u6yavvnujq-uc.a.run.app"
subpath = "printdock"
prefix = "apps"
