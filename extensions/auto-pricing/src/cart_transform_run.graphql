query CartTransformRunInput {
  cartTransform {
    pricingHmac: metafield(namespace: "$app", key: "hmac_secret") {
      value
    }
  }
  shop {
    shopHmac: metafield(namespace: "$app", key: "hmac_secret") {
      value
    }
  }
  cart {
    lines {
      id
      quantity
      merchandise {
        __typename
        ... on ProductVariant {
          id
        }
      }
      sellingPlanAllocation {
        sellingPlan {
          id
        }
      }
      priceToken: attribute(key: "__pd_price_token") {
        value
      }
    }
  }
}
