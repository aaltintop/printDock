query CartTransformRunInput {
  cart {
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
        }
      }
      merchandise {
        ... on ProductVariant {
          id
        }
      }
      sessionAttribute: attribute(key: "_uc_session") {
        value
      }
      feeForAttribute: attribute(key: "_pd_fee_for") {
        value
      }
      sellingPlanAllocation {
        sellingPlan {
          id
        }
      }
      priceAttribute: attribute(key: "_pd_calculated_price") {
        value
      }
    }
  }
}
