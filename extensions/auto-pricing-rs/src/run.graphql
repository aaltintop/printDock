query Input {
  cartTransform {
    pricingHmac: metafield(namespace: "$app", key: "hmac_secret") {
      value
    }
  }
  shop {
    shopHmac: metafield(namespace: "$app", key: "hmac_secret") {
      value
    }
  }
  cart {
    priceMap: attribute(key: "_pd_price_map") {
      value
    }
    priceMapLegacy: attribute(key: "__pd_price_map") {
      value
    }
    lines {
      id
      quantity
      merchandise {
        __typename
        ... on ProductVariant {
          id
        }
      }
      sellingPlanAllocation {
        sellingPlan {
          id
        }
      }
      sessionToken: attribute(key: "_uc_session") {
        value
      }
      viewUploadsLink: attribute(key: "__View uploads") {
        value
      }
      viewUploads: attribute(key: "View uploads") {
        value
      }
      ucExp: attribute(key: "__ucExp") {
        value
      }
      ucToken: attribute(key: "__ucToken") {
        value
      }
      artwork: attribute(key: "Artwork") {
        value
      }
      feeFor: attribute(key: "_pd_fee_for") {
        value
      }
    }
  }
}
