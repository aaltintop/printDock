# Cloud Build config for the PrintDock Cloud Run service.
#
# Uses Kaniko with a persistent layer cache stored in Artifact Registry.
# That makes `npm ci` (the slowest single step in the Dockerfile) a cache hit
# whenever package-lock.json is unchanged, taking a typical re-deploy from
# ~4 min of build time down to ~30-60s.
#
# Substitutions (passed by scripts/deploy-cloudrun-two-phase.sh):
#   _SERVICE   Service name, e.g. printdock-service
#   _REGION    AR region, e.g. us-central1
#   _AR_REPO   Artifact Registry repo, e.g. printdock-images
#   _TAG       Image tag (commit SHA or timestamp); defaults to "latest" so
#              the file works even when invoked manually.
#
# The full image reference becomes:
#   ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:${_TAG}
#
# Cache layers are written to a sibling path so they don't pollute the image
# tag listing:
#   ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}/cache

substitutions:
  _SERVICE: "printdock-service"
  _REGION: "us-central1"
  _AR_REPO: "printdock-images"
  _TAG: "latest"

options:
  # Bigger machine = faster `npm ci` and `npm run build` even on cold cache.
  # E2_HIGHCPU_8 has 8 vCPUs / 8 GiB RAM and is well-priced for short builds.
  machineType: "E2_HIGHCPU_8"

steps:
  - id: build
    name: "gcr.io/kaniko-project/executor:v1.23.2"
    args:
      - "--destination=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:${_TAG}"
      - "--destination=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:latest"
      - "--cache=true"
      - "--cache-ttl=168h"
      - "--cache-repo=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}/cache"
      - "--dockerfile=Dockerfile"
      - "--context=dir:///workspace"
      - "--use-new-run"
      - "--build-arg"
      - "PRINTDOCK_BUILD_ID=${_TAG}"
      - "--build-arg"
      - "PRINTDOCK_DEPLOYED_AT=${BUILD_ID}" # Kaniko already pushes via
# --destination above, and the post-step verification often emits a misleading
# "Image(s) could not be found" message when the real issue was Kaniko itself
# failing earlier (most commonly: missing roles/artifactregistry.writer for
# the Cloud Build service account on the target repo).

timeout: "1800s"
